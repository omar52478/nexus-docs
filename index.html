<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/assets/images/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nexus Docs</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    
    <!-- Global JS Stabilization Mocks -->
    <script>
      window.onload = function() {
        if (window.jQuery) {
          const nop = function() { return this; };
          const plugins = ['magnificPopup', 'metisMenu', 'marquee', 'owlCarousel', 'slick', 'appear', 'parallaxScroll'];
          plugins.forEach(p => {
            if (!window.jQuery.fn[p]) window.jQuery.fn[p] = nop;
          });
        }
      };
    </script>
  </body>
</html>
